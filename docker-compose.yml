version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: pusat_db
      MYSQL_ROOT_PASSWORD: rootpassword`n      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    ports:
      - "4000:4000"
    container_name: pusat-app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: rootpassword
      DB_NAME: pusat_db
    restart: always

volumes:
  db_data:
